apiVersion: v1
kind: ConfigMap
metadata:
  name: resgrid-tts-config
data:
  tts-s3-endpoint: https://minio.example.com
  tts-s3-region: us-east-1
  tts-s3-bucket: tts-audio
  tts-s3-public-base-url: ""
  tts-default-voice: en-us
  tts-default-speed: "175"
  tts-playback-base-url: ""
  tts-playback-memory-cache-minutes: "60"
  tts-playback-cache-control-seconds: "86400"
  tts-max-concurrent-generations: "4"
  tts-temp-directory: /tmp/resgrid-tts
  tts-pregenerated-prompts: Press 1 for yes;Press 2 for no;Invalid option;Please try again
  tts-static-prompt-refresh-interval-minutes: "1440"
---
apiVersion: v1
kind: Secret
metadata:
  name: resgrid-tts-secrets
type: Opaque
stringData:
  tts-s3-access-key: change-me
  tts-s3-secret-key: change-me
  tts-static-prompt-admin-key: change-me
  tts-redis-connection-string: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resgrid-tts
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: resgrid-tts
  template:
    metadata:
      labels:
        app: resgrid-tts
    spec:
      securityContext:
        fsGroup: 10001
      containers:
        - name: resgrid-tts
          image: resgridllc/resgridwebtts:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: RESGRID__TtsConfig__S3Endpoint
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-s3-endpoint
            - name: RESGRID__TtsConfig__S3Region
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-s3-region
            - name: RESGRID__TtsConfig__S3Bucket
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-s3-bucket
            - name: RESGRID__TtsConfig__S3PublicBaseUrl
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-s3-public-base-url
            - name: RESGRID__TtsConfig__S3AccessKey
              valueFrom:
                secretKeyRef:
                  name: resgrid-tts-secrets
                  key: tts-s3-access-key
            - name: RESGRID__TtsConfig__S3SecretKey
              valueFrom:
                secretKeyRef:
                  name: resgrid-tts-secrets
                  key: tts-s3-secret-key
            - name: RESGRID__TtsConfig__DefaultVoice
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-default-voice
            - name: RESGRID__TtsConfig__DefaultSpeed
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-default-speed
            - name: RESGRID__TtsConfig__PlaybackBaseUrl
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-playback-base-url
            - name: RESGRID__TtsConfig__PlaybackMemoryCacheMinutes
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-playback-memory-cache-minutes
            - name: RESGRID__TtsConfig__PlaybackCacheControlSeconds
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-playback-cache-control-seconds
            - name: RESGRID__TtsConfig__MaxConcurrentGenerations
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-max-concurrent-generations
            - name: RESGRID__TtsConfig__TempDirectory
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-temp-directory
            - name: RESGRID__TtsConfig__PreGeneratedPrompts
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-pregenerated-prompts
            - name: RESGRID__TtsConfig__StaticPromptRefreshIntervalMinutes
              valueFrom:
                configMapKeyRef:
                  name: resgrid-tts-config
                  key: tts-static-prompt-refresh-interval-minutes
            - name: RESGRID__TtsConfig__StaticPromptAdminKey
              valueFrom:
                secretKeyRef:
                  name: resgrid-tts-secrets
                  key: tts-static-prompt-admin-key
            - name: RESGRID__CacheConfig__RedisConnectionString
              valueFrom:
                secretKeyRef:
                  name: resgrid-tts-secrets
                  key: tts-redis-connection-string
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          volumeMounts:
            - name: temp-storage
              mountPath: /tmp/resgrid-tts
      volumes:
        - name: temp-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: resgrid-tts
spec:
  selector:
    app: resgrid-tts
  ports:
    - name: http
      port: 80
      targetPort: http
