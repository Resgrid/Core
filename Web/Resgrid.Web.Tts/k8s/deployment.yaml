apiVersion: v1
kind: ConfigMap
metadata:
  name: resgrid-tts-config
  labels:
    app.kubernetes.io/name: resgrid-tts
    app.kubernetes.io/part-of: resgrid
    app.kubernetes.io/managed-by: fleet
data:
  RESGRID__TtsConfig__ServiceBaseUrl: https://tts.example.com
  RESGRID__TtsConfig__PlaybackBaseUrl: ""
  RESGRID__TtsConfig__S3Endpoint: https://minio.example.com
  RESGRID__TtsConfig__S3Region: us-east-1
  RESGRID__TtsConfig__S3Bucket: tts-audio
  RESGRID__TtsConfig__S3PublicBaseUrl: ""
  RESGRID__TtsConfig__S3UseSsl: "true"
  RESGRID__TtsConfig__S3ForcePathStyle: "true"
  RESGRID__TtsConfig__S3UsePresignedUrls: "true"
  RESGRID__TtsConfig__S3PresignedUrlExpiryMinutes: "60"
  RESGRID__TtsConfig__DefaultVoice: en-us+klatt4
  RESGRID__TtsConfig__DefaultSpeed: "165"
  RESGRID__TtsConfig__MaxConcurrentGenerations: "4"
  RESGRID__TtsConfig__MaxTextLength: "1000"
  RESGRID__TtsConfig__PiperExecutable: /usr/local/bin/piper
  RESGRID__TtsConfig__PiperModelDirectory: /usr/local/share/piper-voices
  RESGRID__TtsConfig__FfmpegExecutable: /usr/bin/ffmpeg
  RESGRID__TtsConfig__TempDirectory: /tmp/resgrid-tts
  RESGRID__TtsConfig__CachePrefix: tts
  RESGRID__TtsConfig__PlaybackMemoryCacheMinutes: "60"
  RESGRID__TtsConfig__PlaybackCacheControlSeconds: "86400"
  RESGRID__TtsConfig__WarmupEnabled: "true"
  RESGRID__TtsConfig__StaticPromptRefreshIntervalMinutes: "1440"
  RESGRID__TtsConfig__PreGeneratedPrompts: >-
    Press 1 for yes;Press 2 for no;Invalid option;Please try again;Please stay on the line;This call has been closed. Goodbye.;You have been marked responding to the scene. Goodbye.;Sorry, that was not a valid selection.;Hello, this is Resgrid calling with your verification code.;That was your Resgrid verification code. Goodbye.;Thank you for calling the Resgrid automated personnel system. The number you called is not tied to an active department, or the department doesn't have this feature enabled. Goodbye.;We couldn't complete your verification call. Please request a new code and try again. Goodbye.;Please select from the following options.;To list current active calls, press 1.;To list current user statuses, press 2.;To list current unit statuses, press 3.;To list upcoming calendar events, press 4.;To list upcoming shifts, press 5.;To set your current status, press 6.;To set your current staffing level, press 7.;Press 0 to repeat. Press 1 to respond to the scene.;To hear the dispatch again, press 1. To hear response options, press 2.;To choose a response option, enter the option number, then press pound.;To hear the dispatch again, enter 0 and press pound.;Press 0 to go back to the main menu.;To go back to the main menu, enter 0 and press pound.;To set your current status, enter the number of your selection, then press pound.;To set your current staffing, enter the number of your selection, then press pound.;Invalid status selection. Returning to the main menu.;No status selection made. Returning to the main menu.;Invalid staffing selection. Returning to the main menu.;No staffing selection made. Returning to the main menu.;Thank you. Your response has been recorded.
  RESGRID__TtsConfig__RateLimitPermitLimit: "60"
  RESGRID__TtsConfig__RateLimitQueueLimit: "10"
  RESGRID__TtsConfig__RateLimitWindowSeconds: "60"
---
apiVersion: v1
kind: Secret
metadata:
  name: resgrid-tts-secrets
  labels:
    app.kubernetes.io/name: resgrid-tts
    app.kubernetes.io/part-of: resgrid
    app.kubernetes.io/managed-by: fleet
type: Opaque
stringData:
  RESGRID__TtsConfig__S3AccessKey: change-me
  RESGRID__TtsConfig__S3SecretKey: change-me
  RESGRID__TtsConfig__StaticPromptAdminKey: change-me
  RESGRID__CacheConfig__RedisConnectionString: change-me
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resgrid-tts
  labels:
    app.kubernetes.io/name: resgrid-tts
    app.kubernetes.io/part-of: resgrid
    app.kubernetes.io/managed-by: fleet
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: resgrid-tts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resgrid-tts
        app.kubernetes.io/part-of: resgrid
    spec:
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: resgrid-tts
          image: resgridllc/resgridwebtts:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8080
          envFrom:
            - configMapRef:
                name: resgrid-tts-config
            - secretRef:
                name: resgrid-tts-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 18
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: temp-storage
              mountPath: /tmp/resgrid-tts
      volumes:
        - name: temp-storage
          ephemeral:
            volumeClaimTemplate:
              metadata:
                labels:
                  app.kubernetes.io/name: resgrid-tts
                  app.kubernetes.io/component: temp-storage
              spec:
                accessModes:
                  - ReadWriteOnce
                storageClassName: longhorn
                resources:
                  requests:
                    storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: resgrid-tts
  labels:
    app.kubernetes.io/name: resgrid-tts
    app.kubernetes.io/part-of: resgrid
    app.kubernetes.io/managed-by: fleet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: resgrid-tts
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resgrid-tts
  labels:
    app.kubernetes.io/name: resgrid-tts
    app.kubernetes.io/part-of: resgrid
    app.kubernetes.io/managed-by: fleet
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - host: tts.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: resgrid-tts
                port:
                  number: 80